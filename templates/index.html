<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link To QR Generator</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, #38bdf8, transparent 30%),
                radial-gradient(circle at bottom right, #2563eb, transparent 30%),
                linear-gradient(135deg, #020617, #0f172a);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 25px;
        }

        .logout-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            text-decoration: none;
            background: white;
            color: #0369a1;
            padding: 12px 20px;
            border-radius: 30px;
            font-weight: 700;
            box-shadow: 0 8px 20px rgba(0,0,0,.2);
            transition: .3s;
        }

        .logout-btn:hover {
            background: #0ea5e9;
            color: white;
            transform: translateY(-2px);
        }

        .container {
            width: 100%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: center;
        }

        .hero {
            color: white;
        }

        .hero-badge {
            display: inline-block;
            background: rgba(255,255,255,.15);
            padding: 10px 18px;
            border-radius: 30px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .hero h1 {
            font-size: 52px;
            line-height: 1.1;
            margin-bottom: 20px;
        }

        .hero p {
            color: #cbd5e1;
            line-height: 1.8;
            font-size: 18px;
        }

        .card {
            background: rgba(255,255,255,.97);
            padding: 35px;
            border-radius: 30px;
            box-shadow: 0 25px 80px rgba(0,0,0,.35);
            animation: slideUp .6s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card h2 {
            color: #0f172a;
            margin-bottom: 10px;
        }

        .card p {
            color: #64748b;
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            color: #334155;
        }

        input {
            width: 100%;
            padding: 16px;
            border: 1px solid #cbd5e1;
            border-radius: 14px;
            font-size: 15px;
            margin-bottom: 18px;
            outline: none;
            transition: .3s;
        }

        input:focus {
            border-color: #0ea5e9;
            box-shadow: 0 0 0 4px rgba(14,165,233,.15);
        }

        .generate-btn {
            width: 100%;
            border: none;
            cursor: pointer;
            padding: 16px;
            border-radius: 14px;
            background: linear-gradient(135deg,#0ea5e9,#2563eb);
            color: white;
            font-size: 16px;
            font-weight: 700;
            transition: .3s;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(14,165,233,.35);
        }

        .spinner {
            width: 22px;
            height: 22px;
            border: 3px solid rgba(255,255,255,.3);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: auto;
            display: none;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        .message {
            margin-top: 18px;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            display: none;
            font-weight: 600;
        }

        .success {
            background: #dcfce7;
            color: #166534;
            display: block;
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
            display: block;
        }

        .preview {
            margin-top: 25px;
            text-align: center;
            display: none;
            border: 2px dashed #cbd5e1;
            padding: 25px;
            border-radius: 20px;
            background: #f8fafc;
        }

        .preview img {
            max-width: 250px;
            width: 100%;
            margin-bottom: 20px;
        }

        .download-btn {
            text-decoration: none;
            background: #16a34a;
            color: white;
            padding: 12px 22px;
            border-radius: 12px;
            display: inline-block;
            font-weight: 700;
            transition: .3s;
        }

        .download-btn:hover {
            background: #15803d;
        }

        @media(max-width:900px) {

            .container {
                grid-template-columns: 1fr;
            }

            .hero {
                text-align: center;
            }

            .hero h1 {
                font-size: 38px;
            }
        }

        @media(max-width:500px) {

            .card {
                padding: 25px;
            }

            .hero h1 {
                font-size: 30px;
            }

            .hero p {
                font-size: 15px;
            }
        }
    </style>
</head>

<body>

    <a href="/logout" class="logout-btn">
        Logout
    </a>

    <div class="container">

        <div class="hero">

            <div class="hero-badge">
                🚀 Professional QR Generator
            </div>

            <h1>
                Convert Links Into Beautiful QR Codes
            </h1>

            <p>
                Generate stylish, high-quality QR codes instantly.
                Perfect for websites, social media, business cards,
                events, and marketing campaigns.
            </p>

        </div>

        <div class="card">

            <h2>Generate QR Code</h2>

            <p>
                Enter a valid URL below.
            </p>

            <form id="qrForm">

                <label>Website URL</label>

                <input
                    type="url"
                    id="url"
                    placeholder="https://example.com"
                    required
                >

                <button class="generate-btn" id="submitBtn">

                    <span id="btnText">
                        Generate QR Code
                    </span>

                    <div class="spinner" id="spinner"></div>

                </button>

            </form>

            <div id="message" class="message"></div>

            <div id="preview" class="preview">

                <img id="qrImage">

                <br>

                <a
                    id="downloadLink"
                    class="download-btn"
                    download="qr-code.png"
                >
                    Download QR
                </a>

            </div>

        </div>

    </div>

    <script>

        const form = document.getElementById("qrForm");
        const spinner = document.getElementById("spinner");
        const btnText = document.getElementById("btnText");
        const submitBtn = document.getElementById("submitBtn");
        const message = document.getElementById("message");

        const preview = document.getElementById("preview");
        const qrImage = document.getElementById("qrImage");
        const downloadLink = document.getElementById("downloadLink");

        form.addEventListener("submit", async (e) => {

            e.preventDefault();

            spinner.style.display = "block";
            btnText.style.display = "none";

            preview.style.display = "none";
            message.style.display = "none";

            submitBtn.disabled = true;

            try {

                const url = document.getElementById("url").value;

                const response = await fetch("/generate", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        url: url
                    })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.message);
                }

                const blob = await response.blob();

                const imageUrl = URL.createObjectURL(blob);

                qrImage.src = imageUrl;
                downloadLink.href = imageUrl;

                preview.style.display = "block";

                message.className = "message success";
                message.innerHTML = "✅ QR Code generated successfully!";
                message.style.display = "block";

            }

            catch(error) {

                message.className = "message error";
                message.innerHTML = error.message;
                message.style.display = "block";
            }

            finally {

                spinner.style.display = "none";
                btnText.style.display = "block";
                submitBtn.disabled = false;
            }

        });

    </script>

</body>
</html>
