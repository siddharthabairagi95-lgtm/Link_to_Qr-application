<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Link to QR Generator</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top left, #2563eb, transparent 35%),
                  radial-gradient(circle at bottom right, #9333ea, transparent 35%),
                  linear-gradient(135deg, #020617, #111827);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: white;
    }

    .app {
      width: 100%;
      max-width: 1050px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      align-items: center;
    }

    .hero h1 {
      font-size: clamp(36px, 6vw, 68px);
      line-height: 1.1;
      margin-bottom: 20px;
    }

    .hero p {
      color: #cbd5e1;
      font-size: 18px;
      max-width: 500px;
      line-height: 1.7;
    }

    .card {
      background: rgba(255, 255, 255, 0.11);
      border: 1px solid rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(18px);
      border-radius: 28px;
      padding: 32px;
      box-shadow: 0 25px 70px rgba(0, 0, 0, 0.35);
    }

    .card h2 {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .card small {
      color: #cbd5e1;
    }

    .input-box {
      margin-top: 28px;
    }

    input {
      width: 100%;
      padding: 16px 18px;
      border-radius: 16px;
      border: none;
      outline: none;
      background: rgba(255, 255, 255, 0.14);
      color: white;
      font-size: 15px;
    }

    input::placeholder {
      color: #cbd5e1;
    }

    input:focus {
      box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.45);
    }

    button {
      margin-top: 18px;
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      transition: 0.3s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(59, 130, 246, 0.35);
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .qr-preview {
      margin-top: 24px;
      background: white;
      border-radius: 22px;
      padding: 18px;
      display: none;
      text-align: center;
    }

    .qr-preview img {
      width: 220px;
      max-width: 100%;
    }

    .download-btn {
      display: none;
      margin-top: 16px;
      text-align: center;
      text-decoration: none;
      color: white;
      font-weight: 600;
      background: #22c55e;
      padding: 14px;
      border-radius: 14px;
    }

    .message {
      margin-top: 16px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
    }

    .error {
      color: #f87171;
    }

    .success {
      color: #86efac;
    }

    .footer {
      margin-top: 22px;
      text-align: center;
      color: #94a3b8;
      font-size: 12px;
    }

    @media (max-width: 850px) {
      .app {
        grid-template-columns: 1fr;
        text-align: center;
      }

      .hero p {
        margin: auto;
      }

      .card {
        max-width: 520px;
        margin: auto;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 14px;
      }

      .card {
        padding: 24px;
        border-radius: 22px;
      }

      .hero h1 {
        font-size: 36px;
      }
    }
  </style>
</head>

<body>

  <main class="app">

    <section class="hero">
      <h1>Turn any link into a QR Code</h1>
      <p>
        Paste your website, YouTube, portfolio, payment, or campaign link
        and generate a clean QR code instantly.
      </p>
    </section>

    <section class="card">
      <h2>QR Generator</h2>
      <small>Fast, simple and responsive Flask app</small>

      <form id="qrForm">
        <div class="input-box">
          <input
            type="url"
            id="url"
            placeholder="https://example.com"
            required
          />
        </div>

        <button id="generateBtn" type="submit">
          Generate QR Code
        </button>
      </form>

      <div class="message" id="message"></div>

      <div class="qr-preview" id="qrPreview">
        <img id="qrImage" alt="Generated QR Code" />
      </div>

      <a id="downloadBtn" class="download-btn" download="qr-code.png">
        Download QR Code
      </a>

      <div class="footer">
        Built with Flask + QRCode + Modern UI
      </div>
    </section>

  </main>

  <script>
    const form = document.getElementById("qrForm");
    const urlInput = document.getElementById("url");
    const button = document.getElementById("generateBtn");
    const message = document.getElementById("message");
    const qrPreview = document.getElementById("qrPreview");
    const qrImage = document.getElementById("qrImage");
    const downloadBtn = document.getElementById("downloadBtn");

    form.addEventListener("submit", async function (event) {
      event.preventDefault();

      message.innerHTML = "";
      qrPreview.style.display = "none";
      downloadBtn.style.display = "none";

      button.disabled = true;
      button.innerText = "Generating...";

      try {
        const response = await fetch("/generate", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            url: urlInput.value
          })
        });

        if (!response.ok) {
          const errorData = await response.json();
          message.innerHTML = `<span class="error">${errorData.message}</span>`;
          return;
        }

        const blob = await response.blob();
        const imageUrl = URL.createObjectURL(blob);

        qrImage.src = imageUrl;
        qrPreview.style.display = "block";

        downloadBtn.href = imageUrl;
        downloadBtn.style.display = "block";

        message.innerHTML = `<span class="success">QR Code generated successfully!</span>`;

      } catch (error) {
        message.innerHTML = `<span class="error">Something went wrong. Check Flask server.</span>`;
      } finally {
        button.disabled = false;
        button.innerText = "Generate QR Code";
      }
    });
  </script>

</body>
</html>
