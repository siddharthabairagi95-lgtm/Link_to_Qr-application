<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up | QR Generator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #020617, #0369a1);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 430px;
            background: white;
            padding: 38px;
            border-radius: 26px;
            box-shadow: 0 25px 70px rgba(0,0,0,.35);
        }

        .logo {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #0ea5e9, #2563eb);
            color: white;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            margin: 0 auto 20px;
        }

        h1 {
            text-align: center;
            color: #0f172a;
            margin-bottom: 8px;
        }

        p {
            text-align: center;
            color: #64748b;
            margin-bottom: 25px;
        }

        label {
            font-weight: 700;
            color: #334155;
            display: block;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 15px;
            border-radius: 14px;
            border: 1px solid #cbd5e1;
            margin-bottom: 16px;
            font-size: 15px;
            outline: none;
        }

        input:focus {
            border-color: #0ea5e9;
            box-shadow: 0 0 0 4px rgba(14,165,233,.15);
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #0ea5e9, #2563eb);
            color: white;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 16px;
            text-align: center;
            font-weight: 600;
        }

        .success {
            background: #dcfce7;
            color: #166534;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 16px;
            text-align: center;
            font-weight: 600;
        }

        .login-link {
            margin-top: 22px;
            text-align: center;
            color: #64748b;
        }

        .login-link a {
            color: #0ea5e9;
            font-weight: 800;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <div class="card">

        <div class="logo">🧾</div>

        <h1>Create Account</h1>

        <p>Sign up to use the QR Generator.</p>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        {% if success %}
            <div class="success">{{ success }}</div>
        {% endif %}

        <form method="POST" action="/signup">

            <label>Username</label>
            <input type="text" name="username" placeholder="Choose username" required>

            <label>Password</label>
            <input type="password" name="password" placeholder="Create password" required>

            <label>Confirm Password</label>
            <input type="password" name="confirm_password" placeholder="Confirm password" required>

            <button type="submit">Sign Up</button>

        </form>

        <div class="login-link">
            Already have an account?
            <a href="/login">Login</a>
        </div>

    </div>

</body>
</html>
